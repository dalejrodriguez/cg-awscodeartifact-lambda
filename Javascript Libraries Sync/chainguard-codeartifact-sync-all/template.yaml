AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Sync Chainguard NPM packages to AWS CodeArtifact.
  Reads a package-lock.json (from S3 or inline), fetches tarballs from
  Chainguard Libraries, and publishes them to CodeArtifact.

Parameters:
  CgrUsername:
    Type: String
    Description: Chainguard registry username
  CgrToken:
    Type: String
    Description: Chainguard registry token
    NoEcho: true
  CodeArtifactDomain:
    Type: String
    Default: my-npm-domain
  CodeArtifactRepo:
    Type: String
    Default: my-npm-repo
  CodeArtifactUpstream:
    Type: String
    Default: npm-public
  MaxInvocations:
    Type: Number
    Description: Safety cap on self-re-invocations
    Default: 50
  # --- New feature parameters ---
  NotificationEmail:
    Type: String
    Description: Email address for SNS completion/failure notifications (leave empty to disable)
    Default: ''
  DryRun:
    Type: String
    Description: Default dry-run mode — preview without publishing (true/false)
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
  PackageAllowlist:
    Type: String
    Description: Comma-separated glob patterns — only matching packages sync (e.g. "@types/*,lodash")
    Default: ''
  PackageDenylist:
    Type: String
    Description: Comma-separated glob patterns — matching packages are skipped (e.g. "debug,colors")
    Default: ''
  ParallelDownloads:
    Type: Number
    Description: Max concurrent tarball download threads
    Default: 5
    MinValue: 1
    MaxValue: 20
  RetryMaxAttempts:
    Type: Number
    Description: Max retry attempts for transient HTTP errors (429/5xx)
    Default: 3
    MinValue: 1
    MaxValue: 10
  RetryBaseDelay:
    Type: String
    Description: Base delay in seconds for exponential backoff (doubles each retry)
    Default: '1.0'

Conditions:
  HasNotificationEmail: !Not [!Equals [!Ref NotificationEmail, '']]

Resources:
  # ------------------------------------------------------------------
  # S3 bucket for errors, checkpoints, and lockfile uploads
  # ------------------------------------------------------------------
  SyncBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AWS::StackName}-chainguard-sync-${AWS::AccountId}'
      LifecycleConfiguration:
        Rules:
          # Lockfile-sync checkpoints
          - Id: CleanupCheckpoints
            Prefix: chainguard-sync/checkpoints/
            Status: Enabled
            ExpirationInDays: 1
          - Id: CleanupErrors
            Prefix: chainguard-sync/errors-
            Status: Enabled
            ExpirationInDays: 30
          # All-versions-sync checkpoints
          - Id: CleanupAllVersionsCheckpoints
            Prefix: chainguard-sync-all/checkpoints/
            Status: Enabled
            ExpirationInDays: 1
          - Id: CleanupAllVersionsErrors
            Prefix: chainguard-sync-all/errors-
            Status: Enabled
            ExpirationInDays: 30
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  # ------------------------------------------------------------------
  # SNS Topic for sync notifications (created only if email provided)
  # ------------------------------------------------------------------
  SyncNotificationTopic:
    Type: AWS::SNS::Topic
    Condition: HasNotificationEmail
    Properties:
      TopicName: !Sub '${AWS::StackName}-sync-notifications'
      Tags:
        - Key: Project
          Value: chainguard-npm-sync

  SyncNotificationSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasNotificationEmail
    Properties:
      TopicArn: !Ref SyncNotificationTopic
      Protocol: email
      Endpoint: !Ref NotificationEmail

  # ------------------------------------------------------------------
  # Lambda: Sync lockfile versions only
  # ------------------------------------------------------------------
  SyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: chainguard-codeartifact-sync
      Handler: lambda_function.lambda_handler
      Runtime: python3.12
      Timeout: 900
      MemorySize: 1024
      Architectures:
        - arm64
      Environment:
        Variables:
          CGR_USERNAME: !Ref CgrUsername
          CGR_TOKEN: !Ref CgrToken
          CODEARTIFACT_DOMAIN: !Ref CodeArtifactDomain
          CODEARTIFACT_REPO: !Ref CodeArtifactRepo
          CODEARTIFACT_UPSTREAM: !Ref CodeArtifactUpstream
          ERRORS_S3_BUCKET: !Ref SyncBucket
          ERRORS_S3_PREFIX: chainguard-sync/
          CHECKPOINT_S3_BUCKET: !Ref SyncBucket
          CHECKPOINT_S3_PREFIX: chainguard-sync/checkpoints/
          CHECKPOINT_BUFFER_MS: '120000'
          MAX_INVOCATIONS: !Ref MaxInvocations
          LOG_LEVEL: DEBUG
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - codeartifact:CreateDomain
                - codeartifact:CreateRepository
                - codeartifact:UpdateRepository
                - codeartifact:AssociateExternalConnection
                - codeartifact:GetAuthorizationToken
                - codeartifact:GetRepositoryEndpoint
                - codeartifact:PutPackageOriginConfiguration
                - codeartifact:PublishPackageVersion
                - codeartifact:ListPackageVersions
                - codeartifact:ListPackages
                - codeartifact:DeletePackageVersions
              Resource: '*'
            - Effect: Allow
              Action:
                - sts:GetServiceBearerToken
              Resource: '*'
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:DeleteObject
              Resource: !Sub '${SyncBucket.Arn}/*'
            - Effect: Allow
              Action:
                - s3:ListBucket
              Resource: !GetAtt SyncBucket.Arn
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource: !GetAtt SyncFunction.Arn

  # ------------------------------------------------------------------
  # Lambda: Sync ALL Chainguard versions (enhanced)
  # ------------------------------------------------------------------
  SyncAllVersionsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: chainguard-codeartifact-sync-all
      Handler: sync_all_versions.lambda_handler
      Runtime: python3.12
      Timeout: 900
      MemorySize: 1024
      Architectures:
        - arm64
      Environment:
        Variables:
          CGR_USERNAME: !Ref CgrUsername
          CGR_TOKEN: !Ref CgrToken
          CODEARTIFACT_DOMAIN: !Ref CodeArtifactDomain
          CODEARTIFACT_REPO: !Ref CodeArtifactRepo
          CODEARTIFACT_UPSTREAM: !Ref CodeArtifactUpstream
          ERRORS_S3_BUCKET: !Ref SyncBucket
          ERRORS_S3_PREFIX: chainguard-sync-all/
          CHECKPOINT_S3_BUCKET: !Ref SyncBucket
          CHECKPOINT_S3_PREFIX: chainguard-sync-all/checkpoints/
          CHECKPOINT_BUFFER_MS: '120000'
          MAX_INVOCATIONS: !Ref MaxInvocations
          LOG_LEVEL: DEBUG
          # --- New feature env vars ---
          SNS_TOPIC_ARN: !If [HasNotificationEmail, !Ref SyncNotificationTopic, '']
          DRY_RUN: !Ref DryRun
          PACKAGE_ALLOWLIST: !Ref PackageAllowlist
          PACKAGE_DENYLIST: !Ref PackageDenylist
          PARALLEL_DOWNLOADS: !Ref ParallelDownloads
          RETRY_MAX_ATTEMPTS: !Ref RetryMaxAttempts
          RETRY_BASE_DELAY: !Ref RetryBaseDelay
      Policies:
        - Version: '2012-10-17'
          Statement:
            # --- CodeArtifact (unchanged) ---
            - Effect: Allow
              Action:
                - codeartifact:CreateDomain
                - codeartifact:CreateRepository
                - codeartifact:UpdateRepository
                - codeartifact:AssociateExternalConnection
                - codeartifact:GetAuthorizationToken
                - codeartifact:GetRepositoryEndpoint
                - codeartifact:PutPackageOriginConfiguration
                - codeartifact:PublishPackageVersion
                - codeartifact:ListPackageVersions
                - codeartifact:ListPackages
                - codeartifact:DeletePackageVersions
              Resource: '*'
            - Effect: Allow
              Action:
                - sts:GetServiceBearerToken
              Resource: '*'
            # --- S3 (unchanged) ---
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:DeleteObject
              Resource: !Sub '${SyncBucket.Arn}/*'
            - Effect: Allow
              Action:
                - s3:ListBucket
              Resource: !GetAtt SyncBucket.Arn
            # --- Self-invoke (unchanged) ---
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource: !GetAtt SyncAllVersionsFunction.Arn
            # --- SNS notifications (new) ---
            - Effect: Allow
              Action:
                - sns:Publish
              Resource: !If
                - HasNotificationEmail
                - !Ref SyncNotificationTopic
                - !Sub 'arn:aws:sns:${AWS::Region}:${AWS::AccountId}:*'
            # --- CloudWatch custom metrics (new) ---
            - Effect: Allow
              Action:
                - cloudwatch:PutMetricData
              Resource: '*'

Outputs:
  SyncFunctionArn:
    Description: Lockfile-versions-only sync function
    Value: !GetAtt SyncFunction.Arn
  SyncFunctionName:
    Value: !Ref SyncFunction
  SyncAllVersionsFunctionArn:
    Description: All-versions sync function (enhanced with notifications, dry-run, parallel, retry, filtering, metrics)
    Value: !GetAtt SyncAllVersionsFunction.Arn
  SyncAllVersionsFunctionName:
    Value: !Ref SyncAllVersionsFunction
  SyncBucketName:
    Description: S3 bucket for errors, checkpoints, and lockfile uploads
    Value: !Ref SyncBucket
  SyncBucketArn:
    Value: !GetAtt SyncBucket.Arn
  SyncNotificationTopicArn:
    Condition: HasNotificationEmail
    Description: SNS topic ARN for sync completion/failure notifications
    Value: !Ref SyncNotificationTopic
